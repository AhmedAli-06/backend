line-length = 100
target-version = "py311"

[lint]
select = [
    "I",   # isort
    "F",   # pyflakes
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
]
ignore = [
    "E501",   # line too long (handled by line-length)
    "B008",   # Depends in argument defaults (FastAPI pattern)
    "B904",   # raise from err in except (FastAPI pattern)
    "E402",   # module-level import not at top (FastAPI import ordering)
    "RUF",    # ruff-specific rules (additive, not critical)
]

[lint.isort]
known-first-party = ["app"]
force-single-line = false
combine-as-imports = true

[lint.per-file-ignores]
"__init__.py" = ["F401"]
"app/main.py" = ["UP042"]  # ErrorCode(str, Enum) - StrEnum alias needed
"app/ml/train.py" = ["F841"]  # ML training code - labels unused by design
"app/services/trust_score_service.py" = ["W293"]  # Trailing whitespace in docstrings (cosmetic)
"tests/**" = ["F401", "F841", "I001", "W292", "W293"]  # Test files - stricter rules from refactoring